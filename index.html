<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Curtain Animation</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #000;
  }

  /* Background content (hidden initially) */
  .content {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 2rem;
    letter-spacing: 2px;

    /* "alive glow" effect */
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { filter: brightness(0.8); }
    to { filter: brightness(1.2); }
  }

  /* Curtains container */
  .curtain-container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    z-index: 10;
    cursor: pointer;
  }

  .curtain {
    width: 50%;
    height: 100%;
    background: linear-gradient(
      to right,
      #8b0000,
      #c40000,
      #8b0000
    );
    transition: transform 1.5s ease-in-out;
  }

  .left {
    transform-origin: left;
  }

  .right {
    transform-origin: right;
  }

  /* Open animation */
  .open .left {
    transform: translateX(-100%);
  }

  .open .right {
    transform: translateX(100%);
  }

  /* Text at bottom */
  .tap-text {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 1.2rem;
    letter-spacing: 1px;
    z-index: 20;
    opacity: 0.8;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.3; }
  }
</style>
</head>

<body>

<!-- Background content -->
<div class="content">
  Your Image / Content Here
</div>

<!-- Curtains -->
<div class="curtain-container" id="curtain">
  <div class="curtain left"></div>
  <div class="curtain right"></div>
</div>

<!-- Tap text -->
<div class="tap-text">Tap anywhere to open</div>

<script>
  const curtain = document.getElementById("curtain");

  curtain.addEventListener("click", () => {
    curtain.classList.add("open");

    // Remove text after opening
    document.querySelector(".tap-text").style.display = "none";
  });
</script>

</body>
</html>
