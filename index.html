<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Playfair Display', serif;
  background: #f4efe9;
  color: #2f2f2f;
}

/* INTRO */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #e9dfd5;
  cursor: pointer;
}

#intro h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

#intro p {
  letter-spacing: 2px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1505691938895-1758d7feb511') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
}

.hero h2 {
  font-size: 26px;
  margin-top: 10px;
}

/* SECTION */
section {
  padding: 70px 20px;
  text-align: center;
}

h2 {
  font-size: 30px;
  margin-bottom: 30px;
}

/* TIMELINE */
.timeline {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  align-items: center;
  max-width: 700px;
  margin: auto;
}

.line {
  width: 4px;
  height: 400px;
  background: #6b8e23;
  margin: auto;
}

.timeline .item {
  margin: 20px 0;
}

.left {
  text-align: right;
  padding-right: 20px;
}

.right {
  text-align: left;
  padding-left: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  margin: 15px auto;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* FAQ */
.faq-item {
  max-width: 400px;
  margin: 10px auto;
}

.faq-question {
  width: 100%;
  padding: 15px;
  border: none;
  background: white;
  cursor: pointer;
  text-align: left;
}

.faq-answer {
  display: none;
  padding: 10px;
  background: #eee;
}

/* BOARDING */
.boarding {
  border: 2px dashed #aaa;
  padding: 25px;
  border-radius: 14px;
  max-width: 400px;
  margin: auto;
}

.barcode {
  height: 50px;
  margin-top: 15px;
  background: repeating-linear-gradient(
    90deg,
    #333 2px,
    transparent 2px,
    transparent 6px
  );
}

/* FORM */
form {
  max-width: 400px;
  margin: auto;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 14px;
  background: #333;
  color: white;
  border: none;
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  border-radius: 50%;
  padding: 14px;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>G & N</h1>
  <p>Tap to Open</p>
</div>

<div id="main" style="display:none">

<!-- HERO -->
<section class="hero">
  <h1>Jeffrey & Annabel</h1>
  <h2>Wedding Day</h2>
</section>

<!-- TIMELINE -->
<section>
  <h2>Schedule</h2>

  <div class="timeline">

    <div class="item left">Ceremony<br>18:00</div>
    <div class="line"></div>
    <div class="item right">Lunch<br>14:00</div>

    <div class="item left">Party<br>22:00</div>
    <div></div>
    <div class="item right">Dinner<br>20:00</div>

  </div>
</section>

<!-- ACCOMMODATION -->
<section>
  <h2>Accommodation</h2>
  <div class="card">Hotel Costa</div>
  <div class="card">Hotel Love</div>
</section>

<!-- FAQ -->
<section>
  <h2>FAQ</h2>

  <div class="faq-item">
    <button class="faq-question">Can I bring children?</button>
    <div class="faq-answer">Yes, you can.</div>
  </div>

  <div class="faq-item">
    <button class="faq-question">Is parking available?</button>
    <div class="faq-answer">Yes, parking is available.</div>
  </div>

</section>

<!-- BOARDING -->
<section>
  <h2>Boarding Pass</h2>
  <div class="boarding">
    Destination: Ibiza
    <div class="barcode"></div>
  </div>
</section>

<!-- RSVP -->
<section>
  <h2>RSVP</h2>
  <form>
    <input placeholder="Your Name">
    <input placeholder="Email">
    <input placeholder="Phone">
    <button>Submit</button>
  </form>
</section>

</div>

<!-- MUSIC -->
<button id="musicBtn">🔊</button>
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>

document.getElementById("intro").onclick = () => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
};

document.querySelectorAll(".faq-question").forEach(btn => {
  btn.onclick = () => {
    let ans = btn.nextElementSibling;
    ans.style.display = ans.style.display === "block" ? "none" : "block";
  };
});

let playing = false;
const music = document.getElementById("music");

document.getElementById("musicBtn").onclick = () => {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
};

</script>

</body>
</html>
